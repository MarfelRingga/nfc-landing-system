<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Rifelo | Offline</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background-color: #f4f3ee;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 2rem;
      box-sizing: border-box;
    }
    .icon {
      width: 40px;
      height: 40px;
      margin-bottom: 1.5rem;
      opacity: 0.3;
    }
    h1 {
      font-size: 1.2rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    p {
      color: #6b7280;
      margin: 0 0 2rem;
      font-size: 0.95rem;
      max-width: 280px;
      line-height: 1.5;
    }
    button {
      background: transparent;
      border: 1px solid #1a1a1a;
      color: #1a1a1a;
      padding: 0.75rem 1.5rem;
      border-radius: 99px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    button:hover {
      background: #1a1a1a;
      color: #fff;
    }
    button:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
    <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M18.364 5.636a9 9 0 00-12.728 0m1.414 1.414a7 7 0 019.9 0m-1.414 1.414a5 5 0 00-7.07 0m1.414 1.414a3 3 0 014.242 0" />
  </svg>
  <h1>Koneksi terputus</h1>
  <p>Anda sedang offline. Periksa kembali koneksi internet Anda.</p>
  <button onclick="window.location.reload()">Coba lagi</button>
</body>
</html>
