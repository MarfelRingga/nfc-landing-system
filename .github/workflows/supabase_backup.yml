name: Supabase Backup

on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql-keyring.gpg] http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/postgresql.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          sudo -v ; curl https://rclone.org/install.sh | sudo bash

      - name: Setup rclone with OAuth Config
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONFIG_CONTENT }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONF" > ~/.config/rclone/rclone.conf
          chmod 600 ~/.config/rclone/rclone.conf

      - name: Verify Setup
        run: |
          echo "List Current Remotes:"
          rclone listremotes
          rclone config show
          
      - name: Test Connection
        run: |
          echo "Testing access to remote..."
          rclone about gdrive: || rclone lsd gdrive: -v

      - name: Run backup script
        env:
          DB_URL: ${{ secrets.DB_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BACKUP_LOCAL_PATH: "./backups"
          RCLONE_REMOTE_NAME: "gdrive"
          RCLONE_DEST_PATH: ""
        run: |
          chmod +x ./scripts/supabase_backup.sh
          ./scripts/supabase_backup.sh
